<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwoopScore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>

  <!-- SETUP SCREEN -->
  <div id="setup" class="screen active">
    <header class="brand">
      <h1><span class="brand-swoop">Swoop</span><span class="brand-score">Score</span></h1>
    </header>

    <section class="card stagger-1">
      <h2>Game Mode</h2>
      <div id="mode-toggle" class="toggle-group">
        <button class="toggle" data-mode="score">Play to score</button>
        <button class="toggle active" data-mode="rounds">Play rounds</button>
        <div class="toggle-indicator"></div>
      </div>
      <div class="target-input">
        <label id="target-label" for="target">Number of rounds</label>
        <input type="number" id="target" min="1" value="6">
      </div>
      <div class="score-direction">
        <label>Winner has</label>
        <div id="direction-toggle" class="toggle-group toggle-sm">
          <button class="toggle" data-direction="high">Highest score</button>
          <button class="toggle active" data-direction="low">Lowest score</button>
          <div class="toggle-indicator"></div>
        </div>
      </div>
    </section>

    <section class="card stagger-2">
      <h2>Players</h2>
      <div id="recent-names"></div>
      <div id="player-list">
        <div class="player-row">
          <input type="text" class="player-name" placeholder="Player 1">
          <button class="remove-player" aria-label="Remove">&times;</button>
        </div>
        <div class="player-row">
          <input type="text" class="player-name" placeholder="Player 2">
          <button class="remove-player" aria-label="Remove">&times;</button>
        </div>
      </div>
    </section>

    <button id="start-game" class="btn-primary stagger-3">Start Game</button>
  </div>

  <!-- SCORING SCREEN -->
  <div id="scoring" class="screen">
    <header class="scoring-header">
      <button id="back-btn" class="btn-icon" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 4l-8 6 8 6"/></svg>
      </button>
      <h1 class="scoring-title"><span class="brand-swoop">Swoop</span><span class="brand-score">Score</span></h1>
      <div id="game-info"></div>
    </header>

    <div class="grid-wrapper">
      <table id="score-grid">
        <thead id="grid-head"></thead>
        <tbody id="grid-body"></tbody>
        <tfoot id="grid-foot"></tfoot>
      </table>
    </div>

    <p id="score-status" class="score-status hidden"></p>

    <div class="grid-actions">
      <button id="add-round" class="btn-primary hidden">+ Add Round</button>
      <button id="clear-all" class="btn-danger-ghost">Clear All Scores</button>
    </div>

    <div id="game-over" class="hidden">
      <div class="winner-card">
        <h2 id="winner-text"></h2>
        <button id="new-game" class="btn-primary">New Game</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
